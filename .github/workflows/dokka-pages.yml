name: Publish Dokka to GitHub Pages

# Rebuilds the Dokka HTML site on every push to main and on release tags, then publishes
# it to GitHub Pages for https://sara-star-quant.github.io/KioskOps-SDK-Android-Enterprise/.
#
# Kept separate from build.yml so the main build never blocks on Pages deployment and so
# a Pages rollback is a single-branch revert.

on:
  push:
    branches: [ "main" ]
    tags: [ "v*.*.*" ]
  workflow_dispatch: {}

# GitHub Pages allows only one active deployment per environment. A push-to-main plus
# a tag push arriving seconds apart would otherwise race and the second deploy fails.
# Cancel the older in-flight deploy when a newer one queues.
concurrency:
  group: github-pages
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Generate Dokka HTML
        run: ./gradlew :kiosk-ops-sdk:dokkaGeneratePublicationHtml --no-daemon

      - name: Prepare site root
        run: |
          mkdir -p "$SITE_DIR"
          cp -r kiosk-ops-sdk/build/dokka/html/. "$SITE_DIR/"
        env:
          SITE_DIR: ${{ runner.temp }}/site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v4.0.0
        with:
          path: ${{ runner.temp }}/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
