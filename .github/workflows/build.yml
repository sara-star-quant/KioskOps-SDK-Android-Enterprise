name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@4d9f0ba0025fe599b4ebab900eb7f3a1d93ef4c2 # v5.0.0
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Generate code coverage report
        run: ./gradlew :kiosk-ops-sdk:koverXmlReportDebug :kiosk-ops-sdk:koverHtmlReportDebug --no-daemon

      - name: Verify coverage threshold
        run: ./gradlew :kiosk-ops-sdk:koverVerifyDebug --no-daemon

      - name: Check binary compatibility
        run: ./gradlew apiCheck --no-daemon

      - name: Run Detekt
        run: ./gradlew :kiosk-ops-sdk:detekt --no-daemon

      - name: Run lint
        run: ./gradlew lintDebug --no-daemon

      - name: Generate API docs
        run: ./gradlew :kiosk-ops-sdk:dokkaGeneratePublicationHtml --no-daemon --no-configuration-cache

      - name: Generate SBOM
        run: ./gradlew :kiosk-ops-sdk:cyclonedxBom --no-daemon

      - name: Build SDK
        run: ./gradlew :kiosk-ops-sdk:assembleRelease --no-daemon

      - name: Check AAR size
        run: |
          AAR_FILE="kiosk-ops-sdk/build/outputs/aar/kiosk-ops-sdk-release.aar"
          SIZE_BYTES=$(stat -f%z "$AAR_FILE" 2>/dev/null || stat -c%s "$AAR_FILE")
          SIZE_KB=$((SIZE_BYTES / 1024))
          MAX_KB=$AAR_SIZE_LIMIT_KB

          echo "AAR size: ${SIZE_KB} KB (limit: ${MAX_KB} KB)" >> "$GITHUB_STEP_SUMMARY"

          if [ "$SIZE_KB" -gt "$MAX_KB" ]; then
            echo "::error::AAR size ${SIZE_KB} KB exceeds limit of ${MAX_KB} KB"
            exit 1
          fi
        env:
          AAR_SIZE_LIMIT_KB: 1536

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v4.6.0
        with:
          name: test-results
          path: '**/build/reports/tests/'
          retention-days: 7

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v4.6.0
        with:
          name: lint-results
          path: '**/build/reports/lint-results-debug.html'
          retention-days: 7

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v4.6.0
        with:
          name: coverage-report
          path: 'kiosk-ops-sdk/build/reports/kover/'
          retention-days: 7

      - name: Upload API docs
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v4.6.0
        with:
          name: api-docs
          path: 'kiosk-ops-sdk/build/dokka/'
          retention-days: 7

      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v4.6.0
        with:
          name: sbom
          path: 'kiosk-ops-sdk/build/reports/bom.*'
          retention-days: 90

      - name: Update coverage badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          REPORT="kiosk-ops-sdk/build/reports/kover/reportDebug.xml"
          if [ ! -f "$REPORT" ]; then
            echo "Coverage report not found, skipping badge update"
            exit 0
          fi
          COVERAGE=$(python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('$REPORT')
          root = tree.getroot()
          missed = covered = 0
          for pkg in root.findall('.//package'):
              for c in pkg.findall('counter'):
                  if c.get('type') == 'LINE':
                      missed += int(c.get('missed', 0))
                      covered += int(c.get('covered', 0))
          total = missed + covered
          print(int(covered * 100 / total) if total > 0 else 0)
          ")
          if [ "$COVERAGE" -ge 80 ]; then
            COLOR="brightgreen"
          elif [ "$COVERAGE" -ge 70 ]; then
            COLOR="green"
          elif [ "$COVERAGE" -ge 60 ]; then
            COLOR="yellowgreen"
          else
            COLOR="orange"
          fi
          curl -s -X PATCH \
            -H "Authorization: token $GIST_TOKEN" \
            -d "{\"files\":{\"kioskops-coverage.json\":{\"content\":\"{\\\"schemaVersion\\\":1,\\\"label\\\":\\\"Coverage\\\",\\\"message\\\":\\\"${COVERAGE}%\\\",\\\"color\\\":\\\"${COLOR}\\\"}\"}}}" \
            "https://api.github.com/gists/$GIST_ID"  > /dev/null
          echo "Badge updated: ${COVERAGE}% (${COLOR})"
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: e10185573398e3034647f57ff8d61076

  instrumented-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@4d9f0ba0025fe599b4ebab900eb7f3a1d93ef4c2 # v5.0.0

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumented tests
        uses: ReactiveCircus/android-emulator-runner@0a638108440efd5c7f980e6ba145dbcdd8f32009 # v2.37.0
        with:
          api-level: 31
          arch: x86_64
          script: ./gradlew :kiosk-ops-sdk:connectedDebugAndroidTest --no-daemon

      - name: Upload instrumented test results
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v4.6.0
        with:
          name: instrumented-test-results
          path: '**/build/reports/androidTests/'
          retention-days: 7
