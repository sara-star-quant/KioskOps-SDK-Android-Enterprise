name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build, test, and verify
        run: |
          ./gradlew \
            testDebugUnitTest \
            :kiosk-ops-sdk:koverXmlReportDebug \
            :kiosk-ops-sdk:koverHtmlReportDebug \
            :kiosk-ops-sdk:koverVerifyDebug \
            apiCheck \
            :kiosk-ops-sdk:detekt \
            lintDebug \
            :kiosk-ops-sdk:assembleRelease

      - name: Generate docs and SBOM
        run: |
          ./gradlew \
            :kiosk-ops-sdk:dokkaGeneratePublicationHtml --no-configuration-cache \
          && ./gradlew \
            :kiosk-ops-sdk:cyclonedxBom

      - name: Upload detekt SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: kiosk-ops-sdk/build/reports/detekt/detekt.sarif
          category: detekt
        continue-on-error: true

      - name: Build attestation summary
        if: always()
        run: |
          AAR="kiosk-ops-sdk/build/outputs/aar/kiosk-ops-sdk-release.aar"
          AAR_SIZE="N/A"; AAR_SHA="N/A"; AAR_KB=0
          if [ -f "$AAR" ]; then
            AAR_SIZE="$(du -h "$AAR" | cut -f1)"
            AAR_SHA="$(sha256sum "$AAR" | cut -d' ' -f1)"
            AAR_KB=$(( $(stat -c%s "$AAR") / 1024 ))
          fi
          COV="N/A"
          REPORT="kiosk-ops-sdk/build/reports/kover/reportDebug.xml"
          if [ -f "$REPORT" ]; then
            COV=$(python3 -c "
          import xml.etree.ElementTree as ET
          t=ET.parse('$REPORT').getroot(); m=c=0
          for p in t.findall('.//package'):
            for x in p.findall('counter'):
              if x.get('type')=='LINE': m+=int(x.get('missed',0)); c+=int(x.get('covered',0))
          print(f'{int(c*100/(m+c))}%' if (m+c)>0 else 'N/A')")
          fi
          TESTS="N/A"
          if ls kiosk-ops-sdk/build/test-results/testDebugUnitTest/*.xml 1>/dev/null 2>&1; then
            TESTS=$(grep -roh 'tests="[0-9]*"' kiosk-ops-sdk/build/test-results/testDebugUnitTest/ | grep -o '[0-9]*' | paste -sd+ | bc)
          fi
          SBOM_SHA="N/A"
          if [ -f "kiosk-ops-sdk/build/reports/bom.json" ]; then
            SBOM_SHA="$(sha256sum kiosk-ops-sdk/build/reports/bom.json | cut -c1-16)..."
          fi
          {
            echo "## Build Attestation"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Unit tests | ${TESTS} |"
            echo "| Line coverage | ${COV} |"
            echo "| AAR size | ${AAR_SIZE} (limit: 1536 KB) |"
            echo "| AAR SHA-256 | \`${AAR_SHA}\` |"
            echo "| SBOM SHA-256 | \`${SBOM_SHA}\` |"
            echo "| JDK | $(java -version 2>&1 | head -1) |"
            echo "| Kotlin | $(grep '^kotlin ' gradle/libs.versions.toml | cut -d'\"' -f2) |"
            echo "| Detekt | clean |"
            echo "| API compat | verified |"
          } >> "$GITHUB_STEP_SUMMARY"
          MAX_KB=1536
          if [ "$AAR_KB" -gt "$MAX_KB" ]; then
            echo "::error::AAR size ${AAR_KB} KB exceeds limit of ${MAX_KB} KB"
            exit 1
          fi

      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.0
        with:
          name: build-reports
          path: |
            **/build/reports/tests/
            **/build/reports/lint-results-debug.html
            kiosk-ops-sdk/build/reports/kover/
            kiosk-ops-sdk/build/reports/detekt/
            kiosk-ops-sdk/build/dokka/
          retention-days: 7

      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.0
        with:
          name: sbom
          path: 'kiosk-ops-sdk/build/reports/bom.*'
          retention-days: 90

      - name: Update coverage badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          REPORT="kiosk-ops-sdk/build/reports/kover/reportDebug.xml"
          if [ ! -f "$REPORT" ]; then
            echo "Coverage report not found, skipping badge update"
            exit 0
          fi
          COVERAGE=$(python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('$REPORT')
          root = tree.getroot()
          missed = covered = 0
          for pkg in root.findall('.//package'):
              for c in pkg.findall('counter'):
                  if c.get('type') == 'LINE':
                      missed += int(c.get('missed', 0))
                      covered += int(c.get('covered', 0))
          total = missed + covered
          print(int(covered * 100 / total) if total > 0 else 0)
          ")
          if [ "$COVERAGE" -ge 80 ]; then
            COLOR="brightgreen"
          elif [ "$COVERAGE" -ge 70 ]; then
            COLOR="green"
          elif [ "$COVERAGE" -ge 60 ]; then
            COLOR="yellowgreen"
          else
            COLOR="orange"
          fi
          curl -s -X PATCH \
            -H "Authorization: token $GIST_TOKEN" \
            -d "{\"files\":{\"kioskops-coverage.json\":{\"content\":\"{\\\"schemaVersion\\\":1,\\\"label\\\":\\\"Coverage\\\",\\\"message\\\":\\\"${COVERAGE}%\\\",\\\"color\\\":\\\"${COLOR}\\\"}\"}}}" \
            "https://api.github.com/gists/$GIST_ID"  > /dev/null
          echo "Badge updated: ${COVERAGE}% (${COLOR})"
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: e10185573398e3034647f57ff8d61076

  instrumented-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Android emulator
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "emulator" \
            "system-images;android-33;default;x86_64" \
            "platform-tools" \
            "platforms;android-33"

      - name: Create and start emulator
        run: |
          export ANDROID_EMULATOR_HOME="$HOME/.android"
          export ANDROID_AVD_HOME="$HOME/.android/avd"
          mkdir -p "$ANDROID_AVD_HOME"

          echo "no" | "$ANDROID_HOME/cmdline-tools/latest/bin/avdmanager" create avd \
            --name "test_avd" \
            --package "system-images;android-33;default;x86_64" \
            --device "pixel_6" \
            --force

          echo "AVD created:"
          ls "$ANDROID_AVD_HOME/"

          "$ANDROID_HOME/emulator/emulator" -avd test_avd \
            -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect &

          echo "Waiting for emulator boot..."
          "$ANDROID_HOME/platform-tools/adb" wait-for-device shell \
            'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 1; done;'
          "$ANDROID_HOME/platform-tools/adb" shell input keyevent 82
          echo "Emulator booted"

      - name: Run instrumented tests
        run: ./gradlew :kiosk-ops-sdk:connectedDebugAndroidTest --no-daemon

      - name: Upload instrumented test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.0
        with:
          name: instrumented-test-results
          path: '**/build/reports/androidTests/'
          retention-days: 7
