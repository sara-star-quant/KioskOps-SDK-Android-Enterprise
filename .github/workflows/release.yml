name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.5.1). Tag must already exist.'
        required: true
        type: string

permissions: read-all

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write  # Required for Sigstore keyless signing
      attestations: write  # Required for SLSA provenance attestations
    steps:
      - name: Validate tag exists
        run: |
          git ls-remote --tags "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY" "$TAG" | grep -q "$TAG" || {
            echo "::error::Tag $TAG does not exist. Push the tag first."
            exit 1
          }
        env:
          TAG: ${{ inputs.tag }}

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}

      - name: Extract version from tag
        id: version
        run: |
          TAG="${INPUT_TAG}"
          echo "VERSION=${TAG#v}" >> $GITHUB_OUTPUT
          echo "TAG=${TAG}" >> $GITHUB_OUTPUT
        env:
          INPUT_TAG: ${{ inputs.tag }}

      - name: Set up JDK 17
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Build release AAR
        run: ./gradlew :kiosk-ops-sdk:assembleRelease -PVERSION_NAME=${{ steps.version.outputs.VERSION }}

      - name: Build sample demo APK
        run: ./gradlew :sample-app:assembleDebug -PVERSION_NAME=${{ steps.version.outputs.VERSION }}

      - name: Run tests
        run: ./gradlew :kiosk-ops-sdk:testDebugUnitTest

      - name: Generate coverage report
        run: |
          ./gradlew :kiosk-ops-sdk:koverXmlReportDebug :kiosk-ops-sdk:koverHtmlReportDebug
          COV="N/A"
          REPORT="kiosk-ops-sdk/build/reports/kover/reportDebug.xml"
          if [ -f "$REPORT" ]; then
            COV=$(python3 -c "
          import xml.etree.ElementTree as ET
          t=ET.parse('$REPORT').getroot(); m=c=0
          for p in t.findall('.//package'):
            for x in p.findall('counter'):
              if x.get('type')=='LINE': m+=int(x.get('missed',0)); c+=int(x.get('covered',0))
          print(f'{int(c*100/(m+c))}%' if (m+c)>0 else 'N/A')")
          fi
          echo "COVERAGE=$COV" >> "$GITHUB_ENV"
          (cd kiosk-ops-sdk/build/reports/kover && zip -qr "$GITHUB_WORKSPACE/kiosk-ops-sdk-coverage.zip" htmlDebug)

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          # cosign 3.x uses the Sigstore bundle format (sig + cert + Rekor entry in one
          # file). Release assets ship a single .bundle per artifact instead of .sig/.pem.
          cosign-release: v3.1.1

      - name: Sign release artifacts with Sigstore
        run: |
          cd kiosk-ops-sdk/build/outputs/aar
          for file in *.aar; do
            cosign sign-blob --yes "$file" --bundle "${file}.bundle"
          done

      - name: Prepare and sign sample demo APK
        run: |
          SRC="sample-app/build/outputs/apk/debug/sample-app-debug.apk"
          APK="kioskops-sample-demo-${VERSION}.apk"
          cp "$SRC" "$APK"
          sha256sum "$APK" > "${APK}.sha256"
          cosign sign-blob --yes "$APK" --bundle "${APK}.bundle"
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}

      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: kiosk-ops-sdk/build/outputs/aar/*.aar

      - name: Generate docs for Javadoc JAR
        run: ./gradlew :kiosk-ops-sdk:dokkaGeneratePublicationHtml -PVERSION_NAME="$VERSION" --no-configuration-cache
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}

      - name: Publish to Maven Central
        run: |
          ./gradlew :kiosk-ops-sdk:publishAndReleaseToMavenCentral --no-configuration-cache -PVERSION_NAME="$VERSION"
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_SIGNING_PASSWORD }}

      - name: Publish to GitHub Packages
        run: |
          ./gradlew :kiosk-ops-sdk:publishMavenPublicationToGitHubPackagesRepository --no-configuration-cache -PVERSION_NAME="$VERSION" || {
            echo "::warning::GitHub Packages publish failed (version may already exist). Continuing."
          }
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_SIGNING_PASSWORD }}

      - name: Generate release notes
        run: |
          VERSION="${INPUT_VERSION}"
          if grep -q "## \[${VERSION}\]" CHANGELOG.md; then
            sed -n "/## \[${VERSION}\]/,/## \[/p" CHANGELOG.md | sed '1d;$d' > release_notes.md
          else
            echo "Release ${VERSION}" > release_notes.md
          fi
          printf '\n\nLine coverage: %s (full report attached as kiosk-ops-sdk-coverage.zip).\n' "$COVERAGE" >> release_notes.md
        env:
          INPUT_VERSION: ${{ steps.version.outputs.VERSION }}
          COVERAGE: ${{ env.COVERAGE }}

      - name: Create GitHub Release
        run: |
          assets=(
            kiosk-ops-sdk/build/outputs/aar/*.aar
            kiosk-ops-sdk/build/outputs/aar/*.bundle
            kiosk-ops-sdk-coverage.zip
            kioskops-sample-demo-*.apk
            kioskops-sample-demo-*.apk.sha256
            kioskops-sample-demo-*.apk.bundle
          )
          # Re-running a release (e.g. to retry a failed Maven Central publish) must not
          # fail just because the release already exists. Create it, or refresh assets.
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TAG" --notes-file release_notes.md --latest
            gh release upload "$TAG" "${assets[@]}" --clobber
          else
            gh release create "$TAG" --title "$TAG" --notes-file release_notes.md --latest "${assets[@]}"
          fi
        env:
          TAG: ${{ steps.version.outputs.TAG }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## Release ${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- **Maven Central**: \`com.sarastarquant.kioskops:kiosk-ops-sdk:${VERSION}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **GitHub Packages**: \`com.sarastarquant.kioskops:kiosk-ops-sdk:${VERSION}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **JitPack**: \`com.github.sara-star-quant:KioskOps-SDK-Android-Enterprise:${TAG}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Signature Verification" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "cosign verify-blob kiosk-ops-sdk-release.aar \\" >> $GITHUB_STEP_SUMMARY
          echo "  --bundle kiosk-ops-sdk-release.aar.bundle \\" >> $GITHUB_STEP_SUMMARY
          echo "  --certificate-identity-regexp 'https://github.com/sara-star-quant/KioskOps-SDK-Android-Enterprise' \\" >> $GITHUB_STEP_SUMMARY
          echo "  --certificate-oidc-issuer https://token.actions.githubusercontent.com" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          TAG: ${{ steps.version.outputs.TAG }}
